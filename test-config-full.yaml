# InfraGuard Full Configuration Example
# Demonstrates multi-domain support with both Cobalt Strike and Mythic C2 profiles

# ── Listeners ─────────────────────────────────────────────────────────
# Each listener binds a port and maps it to one or more domains.
# You can run multiple listeners on different ports / TLS certs.

listeners:
  - bind: "0.0.0.0"
    port: 443
    tls:
      cert: "/etc/letsencrypt/live/cdn.example.com/fullchain.pem"
      key: "/etc/letsencrypt/live/cdn.example.com/privkey.pem"
    domains:
      - "cdn.example.com"
      - "static.example.net"

  - bind: "0.0.0.0"
    port: 80
    domains:
      - "cdn.example.com"

# ── Domains ───────────────────────────────────────────────────────────
# Each domain runs independently with its own C2 profile, upstream
# teamserver, IP whitelist, and drop action.

domains:

  # ── Cobalt Strike domain ────────────────────────────────────────────
  # Fronts a CS teamserver behind a jQuery CDN lookalike.
  # Requests that don't match the malleable profile are redirected
  # to the real jQuery site so the redirector looks legitimate.
  cdn.example.com:
    upstream: "https://10.0.0.5:8443"
    profile_path: "examples/jquery-c2.3.14.profile"
    profile_type: "cobalt_strike"
    whitelist_cidrs:
      - "192.168.1.0/24"       # operator subnet
      - "10.0.0.0/8"           # internal range
    decoy_dir: null             # or path to static site served to blocked visitors
    drop_action:
      type: "redirect"
      target: "https://jquery.com"

  # ── Mythic domain ───────────────────────────────────────────────────
  # Fronts a Mythic teamserver behind a generic CDN static-assets page.
  # Uses the Mythic HTTPX JSON profile format. Non-matching requests
  # get proxied to a real site so the redirector returns valid HTML.
  static.example.net:
    upstream: "https://10.0.0.6:443"
    profile_path: "examples/mythic-httpx.json"
    profile_type: "mythic"
    whitelist_cidrs: []         # empty = all IPs are allowed (no whitelist)
    drop_action:
      type: "proxy"            # serve real content from the target site
      target: "https://example.net"

# ── IP Intelligence ───────────────────────────────────────────────────

intel:
  geoip_db: null                         # set to /path/to/GeoLite2-City.mmdb if available
  blocked_countries: []                  # e.g. ["CN", "RU", "KP"]
  blocked_asns: []                       # e.g. [14061] for DigitalOcean
  auto_block_scanners: true              # block Shodan, Censys, Rapid7, etc.
  dynamic_whitelist_threshold: 3         # auto-whitelist after 3 valid C2 requests

  feeds:
    enabled: true
    refresh_interval_hours: 12
    cache_dir: ".infraguard/feeds"
    urls: []                             # empty = use built-in defaults (abuse.ch, ET, etc.)

# ── Filter Pipeline ───────────────────────────────────────────────────

pipeline:
  block_score_threshold: 0.7
  enable_ip_filter: true
  enable_bot_filter: true
  enable_header_filter: true
  enable_geo_filter: true
  enable_dns_filter: true
  enable_replay_filter: true
  enable_profile_filter: true

# ── Tracking ──────────────────────────────────────────────────────────

tracking:
  db_path: "infraguard.db"
  retention_days: 30

# ── Dashboard API ─────────────────────────────────────────────────────

api:
  bind: "127.0.0.1"
  port: 8080
  auth_token: "${INFRAGUARD_API_TOKEN}"

# ── Logging ───────────────────────────────────────────────────────────

logging:
  level: "INFO"
  format: "json"

plugins: []
