; PwnDrop Configuration
; Docs: https://github.com/kgretzky/pwndrop#configuration
;
; NOTE: The [setup] section below is consumed on FIRST RUN only.
; PwnDrop will automatically remove it from this file after creating
; the admin account. This is normal - do not add it back, or you'll
; see "already exists" errors on restart.

[pwndrop]
listen_ip = 0.0.0.0
http_port = 80
https_port = 443
data_dir = ./data
admin_dir = ./www

; ── First-run setup (auto-removed after use) ──────────────────────────
; Change these BEFORE the first launch. After PwnDrop starts, it creates
; the admin account and deletes this section from the file.
[setup]
username = admin
password = changeme
redirect_url = https://www.google.com
secret_path = /pwndrop
