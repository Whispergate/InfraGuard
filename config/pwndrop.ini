; PwnDrop Configuration
; Edit this file and restart the pwndrop container to apply changes.
; Docs: https://github.com/kgretzky/pwndrop#configuration

[pwndrop]
; External IP of your pwndrop instance (required for nameserver feature)
listen_ip = 0.0.0.0
; HTTP port for file downloads and WebDAV
http_port = 80
; HTTPS port for file downloads and admin panel
https_port = 443
; Data directory (mapped to Docker volume)
data_dir = ./data
; Admin panel web files
admin_dir = ./www

; ── Initial Setup (removed after first run) ───────────────────────────
; Pre-configure admin credentials and settings for automated deployment.
; These are consumed on first launch and then deleted from this file.
[setup]
username = admin
password = changeme
; URL to redirect visitors who hit paths without shared files
redirect_url = https://www.google.com
; Secret path to access the admin login page (change this!)
secret_path = /pwndrop
