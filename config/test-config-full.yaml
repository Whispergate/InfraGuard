# InfraGuard Full Configuration Example
# Demonstrates all features: multi-protocol listeners, multi-domain,
# both C2 frameworks, content delivery, SIEM/webhook plugins, threat
# feeds, GeoIP, rule ingestion, and configurable health endpoint.
#
# Environment variables (${VAR}) are resolved from .env automatically.

# ── Listeners ─────────────────────────────────────────────────────────
# Each listener binds a port for one protocol. Multiple listeners run
# simultaneously, sharing IP intelligence, event tracking, and plugins.
# TLS certs are auto-generated (self-signed) if the paths don't exist.

listeners:
  # HTTPS listener for C2 beacon traffic
  - protocol: "https"
    bind: "0.0.0.0"
    port: 443
    tls:
      cert: "${INFRAGUARD_TLS_CERT}"
      key: "${INFRAGUARD_TLS_KEY}"
    domains:
      - "cdn.example.com"
      - "static.example.net"

  # HTTP listener (no TLS, for redirects or staging)
  - protocol: "http"
    bind: "0.0.0.0"
    port: 80
    domains:
      - "cdn.example.com"

  # DNS listener for DNS-based C2 channels
  # Requires: pip install infraguard[dns-listener]
  # - protocol: "dns"
  #   bind: "0.0.0.0"
  #   port: 53
  #   domains:
  #     - "dns.example.com"
  #   options:
  #     upstream: "8.8.8.8:53"              # forward allowed queries here
  #     allowed_types: ["A", "AAAA", "TXT"] # block other query types

  # MQTT listener for MQTT-based C2 channels
  # Requires: pip install infraguard[mqtt-listener]
  # - protocol: "mqtt"
  #   bind: "0.0.0.0"
  #   port: 1883
  #   options:
  #     upstream: "mqtt://10.0.0.5:1883"    # upstream MQTT broker
  #     allowed_topics: ["sensors/#", "data/#"]

  # WebSocket listener for WS-based C2 channels
  # - protocol: "wss"
  #   bind: "0.0.0.0"
  #   port: 8443
  #   tls:
  #     cert: "${INFRAGUARD_TLS_CERT}"
  #     key: "${INFRAGUARD_TLS_KEY}"
  #   domains:
  #     - "ws.example.com"
  #   options:
  #     upstream: "wss://10.0.0.5:9443"     # upstream WebSocket server
  #     path: "/ws"                          # WebSocket endpoint path

# ── Domains ───────────────────────────────────────────────────────────
# Each domain runs independently with its own C2 profile, upstream
# teamserver, IP whitelist, drop action, and content delivery routes.

domains:

  # ── Cobalt Strike domain ────────────────────────────────────────────
  # Fronts a CS teamserver behind a jQuery CDN lookalike.
  # Requests that don't match the malleable profile are redirected
  # to the real jQuery site so the redirector looks legitimate.
  cdn.example.com:
    upstream: "${INFRAGUARD_CS_UPSTREAM}"
    profile_path: "examples/jquery-c2.3.14.profile"
    profile_type: "cobalt_strike"
    whitelist_cidrs:
      - "192.168.1.0/24"       # operator subnet
      - "10.0.0.0/8"           # internal range
    decoy_dir: null             # or path to static site served to blocked visitors
    drop_action:
      type: "redirect"
      target: "https://jquery.com"

    # ── Content delivery routes (optional) ──────────────────────────
    # Evaluated BEFORE the C2 profile filter. Serve payloads, decoys,
    # or static files at specific paths without affecting beacon traffic.
    # content_routes:
    #   - path: "/downloads/*"
    #     backend:
    #       type: "pwndrop"
    #       target: "http://pwndrop:80"    # Docker internal URL
    #       auth_token: "${PWNDROP_TOKEN}"
    #     conditional:
    #       score_threshold: 0.5           # bots/scanners get decoy instead
    #       scanner_backend:
    #         type: "http_proxy"
    #         target: "https://jquery.com"
    #     track: true
    #   - path: "/assets/*"
    #     backend:
    #       type: "filesystem"
    #       target: "/app/decoys"

  # ── Mythic domain ───────────────────────────────────────────────────
  # Fronts a Mythic teamserver behind a generic CDN static-assets page.
  # Uses the Mythic HTTPX JSON profile format. Non-matching requests
  # get proxied to a real site so the redirector returns valid HTML.
  static.example.net:
    upstream: "${INFRAGUARD_MYTHIC_UPSTREAM}"
    profile_path: "examples/mythic-httpx.json"
    profile_type: "mythic"
    whitelist_cidrs: []         # empty = all IPs are allowed (no whitelist)
    drop_action:
      type: "proxy"            # serve real content from the target site
      target: "https://example.net"

# ── IP Intelligence ───────────────────────────────────────────────────

intel:
  geoip_db: "${INFRAGUARD_GEOIP_DB}"
  geoip_asn_db: "${INFRAGUARD_GEOIP_ASN_DB}"
  geoip_country_db: "${INFRAGUARD_GEOIP_COUNTRY_DB}"
  blocked_countries: []                  # e.g. ["CN", "RU", "KP"]
  blocked_asns: []                       # e.g. [14061] for DigitalOcean
  auto_block_scanners: true              # block Shodan, Censys, Rapid7, etc.
  dynamic_whitelist_threshold: 3         # auto-whitelist after 3 valid C2 requests
  banned_ip_file: "${INFRAGUARD_BANNED_IP_FILE}"  # ingested blocklist from rules/

  feeds:
    enabled: true
    refresh_interval_hours: 12
    cache_dir: ".infraguard/feeds"
    urls: []                             # empty = use built-in defaults (abuse.ch, ET, etc.)

# ── Filter Pipeline ───────────────────────────────────────────────────
# Filters are applied per-protocol. HTTP gets all filters; DNS/MQTT
# only get IP, DNS, and replay filters (no profile/header/bot checks).

pipeline:
  block_score_threshold: 0.7
  enable_ip_filter: true
  enable_bot_filter: true
  enable_header_filter: true
  enable_geo_filter: true
  enable_dns_filter: true
  enable_replay_filter: true
  enable_profile_filter: true

# ── Tracking ──────────────────────────────────────────────────────────

tracking:
  db_path: "${INFRAGUARD_DB_PATH}"
  retention_days: 30

# ── Dashboard API ─────────────────────────────────────────────────────

api:
  bind: "127.0.0.1"
  port: 8080
  auth_token: "${INFRAGUARD_API_TOKEN}"
  health_path: "/${INFRAGUARD_HEALTH_PATH}"  # customizable to avoid fingerprinting

# ── Logging ───────────────────────────────────────────────────────────

logging:
  level: "${INFRAGUARD_LOG_LEVEL}"
  format: "json"

# ── Plugins ───────────────────────────────────────────────────────────
# List of plugin module paths to load. Each plugin can be configured
# independently via plugin_settings below.

plugins:
  # SIEM integrations (batch-based, high throughput)
  # - infraguard.plugins.builtin.elasticsearch
  # - infraguard.plugins.builtin.wazuh
  # - infraguard.plugins.builtin.syslog

  # Webhook integrations (immediate, per-event alerts)
  # - infraguard.plugins.builtin.discord
  # - infraguard.plugins.builtin.slack
  # - infraguard.plugins.builtin.generic_webhook

  # Example / testing
  - infraguard.plugins.builtin.example

# ── Plugin Settings ───────────────────────────────────────────────────
# Per-plugin configuration. The key matches the plugin's `name` attribute.
# Each plugin supports:
#   enabled: bool          -- set false to skip loading
#   event_filter:          -- control which events are forwarded
#     only_blocked: bool   -- only forward blocked requests
#     only_allowed: bool   -- only forward allowed requests
#     min_score: float     -- only forward events with score >= this
#     include_domains: []  -- only forward events for these domains
#     exclude_domains: []  -- skip events for these domains
#   options: {}            -- plugin-specific key/value pairs

plugin_settings:

  # ── Elasticsearch ─────────────────────────────────────────────────
  # Forwards events to Elasticsearch via the _bulk API.
  # Supports API key auth or basic auth (username/password).
  # elasticsearch:
  #   enabled: true
  #   event_filter:
  #     min_score: 0.0          # forward all events (0.0 = everything)
  #   options:
  #     url: "${ELASTICSEARCH_URL}"             # e.g. https://es.example.com:9200
  #     index: "infraguard-events"
  #     api_key: "${ELASTICSEARCH_API_KEY}"     # or use username/password below
  #     # username: "elastic"
  #     # password: "${ELASTICSEARCH_PASSWORD}"
  #     batch_size: 50
  #     flush_interval: 10

  # ── Wazuh ─────────────────────────────────────────────────────────
  # Forwards events to Wazuh-Indexer (OpenSearch) via _bulk API.
  # Authenticates via Wazuh API JWT token (auto-refreshed).
  # wazuh:
  #   enabled: true
  #   event_filter:
  #     min_score: 0.0
  #   options:
  #     url: "${WAZUH_API_URL}"                 # e.g. https://wazuh.example.com:55000
  #     indexer_url: "${WAZUH_INDEXER_URL}"      # e.g. https://wazuh.example.com:9200
  #     username: "wazuh-wui"
  #     password: "${WAZUH_PASSWORD}"
  #     index: "infraguard-events"
  #     batch_size: 50
  #     flush_interval: 10

  # ── Syslog ────────────────────────────────────────────────────────
  # Forwards events as CEF or JSON syslog messages.
  # Supports UDP, TCP, and TCP+TLS transports.
  # Covers Splunk, QRadar, ArcSight, and any syslog-compatible SIEM.
  # syslog:
  #   enabled: true
  #   event_filter:
  #     only_blocked: true
  #   options:
  #     host: "syslog.example.com"
  #     port: 514                               # 514=UDP, 6514=TLS
  #     protocol: "udp"                          # udp | tcp | tcp+tls
  #     format: "cef"                            # cef | json
  #     facility: 1                              # syslog facility (1=user)
  #     # ca_cert: "/path/to/ca.pem"             # for tcp+tls
  #     batch_size: 100
  #     flush_interval: 5

  # ── Discord ───────────────────────────────────────────────────────
  # Sends alerts to a Discord channel via webhook with rich embeds.
  # Color-coded: red for blocked, green for allowed.
  # discord:
  #   enabled: true
  #   event_filter:
  #     only_blocked: true                       # only alert on blocked requests
  #   options:
  #     webhook_url: "${DISCORD_WEBHOOK_URL}"
  #     username: "InfraGuard"
  #     # avatar_url: "https://example.com/logo.png"
  #     # mention_role: "123456789"              # Discord role ID to @mention

  # ── Slack ─────────────────────────────────────────────────────────
  # Sends alerts to Slack via incoming webhook with Block Kit formatting.
  # slack:
  #   enabled: true
  #   event_filter:
  #     only_blocked: true
  #   options:
  #     webhook_url: "${SLACK_WEBHOOK_URL}"
  #     # channel: "#infraguard-alerts"          # override webhook default
  #     username: "InfraGuard"
  #     icon_emoji: ":shield:"

  # ── Generic Webhook ───────────────────────────────────────────────
  # POST JSON events to any URL. Covers Rocket.Chat, Mattermost,
  # Microsoft Teams, and custom endpoints.
  # generic_webhook:
  #   enabled: true
  #   event_filter:
  #     only_blocked: true
  #   options:
  #     url: "${WEBHOOK_URL}"
  #     method: "POST"                           # HTTP method
  #     content_type: "application/json"
  #     headers:                                 # extra HTTP headers
  #       Authorization: "Bearer ${WEBHOOK_TOKEN}"
  #     # body_template: '{"text": "Blocked {client_ip} on {domain}: {uri}"}'
